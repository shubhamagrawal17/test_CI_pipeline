name: CI Pipeline Demo
on:
  push:
    branches: ["main"]
jobs:
  build-stage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: build_artifacts
          path: dist
          
          
