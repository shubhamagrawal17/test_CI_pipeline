name: CI Pipeline Demo
on: workflow_dispatch
  #push:
    #branches: ["main"]
jobs:
  build-stage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: mkdir build_artifacts
      - run: mv node_modules build_artifacts
      - run: cp package.json build_artifacts
      - run: cp -r dist build_artifacts
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: artifacts
          path: build_artifacts
  test-job:
    runs-on: ubuntu-22.04
    needs: build-stage
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 18
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: test-coverage
          path: coverage
  lint:
    runs-on: ubuntu-22.04
    needs: test-job
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v6.4.0    
        with:
          node-version: 18
      - run: npm ci
      - run: npm run lint
  deploy:
    runs-on: ubuntu-22.04
    needs: lint
    steps:
    - uses: actions/download-artifact@v7.0.0
      with:
        name: artifacts
    - name: Azure WebApp
      uses: Azure/webapps-deploy@v3.0.7
      with:
        app-name: demoapp211
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE}}
        package: .
      
        
    
          
